services:
  dokploy-webhook-proxy:
    image: nginxinc/nginx-unprivileged:stable-alpine
    container_name: dokploy-webhook-proxy
    restart: unless-stopped
    init: true

    network_mode: host

    pids_limit: 64
    mem_limit: 64m
    cpus: 0.25

    read_only: true

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp:size=16m,mode=1777

    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
